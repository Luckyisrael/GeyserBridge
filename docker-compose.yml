version: "3.9"

services:
  geyser-bridge:
    build: .
    ports:
      - "10000:10000"
      - "10001:10001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10001/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
